name: build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  windows_tools:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: compnerd/ds2
          ref: ${{ needs.context.outputs.ds2_revision }}
          path: ${{ github.workspace }}/SourceCache/ds2
          show-progress: false

      - uses: compnerd/gha-setup-vsdevenv@main
        with:
          host_arch: amd64
          components: 'Microsoft.VisualStudio.Component.VC.Tools.x86.x64;Microsoft.VisualStudio.Component.VC.Tools.ARM64'
          arch: amd64

      - name: Install Build Tools
        run: choco install winflexbison3

      - name: Configure RegsGen2
        run: |
          cmake -B ${{ github.workspace }}/BinaryCache/RegsGen2 `
                -S ${{ github.workspace }}/SourceCache/ds2/Tools/RegsGen2 `
                -C ${{ github.workspace }}/SourceCache/ds2/cmake/caches/MSVCWarnings.cmake `
                -D CMAKE_BUILD_TYPE=Release `
                -D CMAKE_C_COMPILER=cl `
                -D CMAKE_CXX_COMPILER=cl `
                -D CMAKE_C_FLAGS="-ffunction-sections -fdata-sections" `
                -D CMAKE_CXX_FLAGS="-ffunction-sections -fdata-sections" `
                -D CMAKE_MT=mt `
                -G Ninja

      - name: Build RegsGen2
        run: cmake --build ${{ github.workspace }}/BinaryCache/RegsGen2 --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: windows-regsgen2
          path: |
            ${{ github.workspace }}/BinaryCache/RegsGen2/regsgen2.exe

  windows:
    needs: [windows_tools]
    runs-on: windows-latest

    strategy:
      matrix:
        arch: ['Win32', 'x64'] # ['ARM', 'ARM64']

    steps:
      - uses: actions/checkout@v4

      - name: Install Build Tools
        run: choco install winflexbison3

      - uses: actions/download-artifact@v4
        with:
          name: windows-regsgen2
          path: ${{ github.workspace }}/BinaryCache/RegsGen2/Release

      - name: Configure
        run: |
          cmake -B ${{ github.workspace }}/BinaryCache/ds2 `
                -C ${{ github.workspace }}/cmake/caches/MSVCWarnings.cmake `
                -G "Visual Studio 17 2022" `
                -A ${{ matrix.arch }} `
                -D DS2_REGSGEN2=${{ github.workspace }}/BinaryCache/RegsGen2/Release/regsgen2.exe `
                -S ${{ github.workspace }}
      - name: Build
        run: cmake --build ${{ github.workspace }}/BinaryCache/ds2 --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-ds2
          path: |
            ${{ github.workspace }}/BinaryCache/ds2/Release/ds2.exe


  mingw:
    needs: [windows_tools]
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    strategy:
      fail-fast: false
      matrix:
        include:
          - { system: ucrt64, env: ucrt-x86_64 }
          - { system: clang64, env: clang-x86_64 }

    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.system }}
          install: >-
            flex
            bison
            mingw-w64-${{ matrix.env }}-cmake
            mingw-w64-${{ matrix.env }}-toolchain
            mingw-w64-${{ matrix.env }}-ninja

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-regsgen2
          path: ${{ github.workspace }}/BinaryCache/RegsGen2/Release

      - name: Configure
        run: |
          cmake -B $(cygpath -u '${{ github.workspace }}/BinaryCache/ds2')      \
                -C $(cygpath -u '${{ github.workspace }}/cmake/caches/GNUWarnings.cmake') \
                -D CMAKE_BUILD_TYPE=Release                                     \
                -G Ninja                                                        \
                -D DS2_REGSGEN2=$(cygpath -u '${{ github.workspace }}/BinaryCache/RegsGen2/Release/regsgen2.exe') \
                -S $(cygpath -u '${{ github.workspace }}')
      - name: Build
        run: cmake --build $(cygpath -u '${{ github.workspace }}/BinaryCache/ds2') --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: mingw-${{ matrix.system }}-ds2
          path: |
            ${{ github.workspace }}/BinaryCache/ds2/ds2.exe

  macos:
    # The macos-latest runner image runs on an M1 ARM CPU which is not currently
    # supported by ds2. Build on macos-13, which is x86_64-based, until Darwin
    # on ARM support is implemented.
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@master

      - name: Configure
        run: |
          cmake -B ${{ github.workspace }}/BinaryCache/ds2                      \
                -C ${{ github.workspace }}/cmake/caches/ClangWarnings.cmake     \
                -D CMAKE_BUILD_TYPE=Release                                     \
                -G Ninja                                                        \
                -S ${{ github.workspace }}
      - name: Build
        run: cmake --build ${{ github.workspace }}/BinaryCache/ds2 --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: macOS-x86_64-ds2
          path: |
            ${{ github.workspace }}/BinaryCache/ds2/ds2

  linux:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { processor: x86_64, cflags: "", cxxflags: "" }
          - { processor: i686, cflags: "-m32", cxxflags: "-m32" }

    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -qq --no-install-recommends bison flex gcc-multilib g++-multilib ninja-build

      - name: Configure
        run: |
          cmake -B ${{ github.workspace }}/BinaryCache/ds2                      \
                -C ${{ github.workspace }}/cmake/caches/GNUWarnings.cmake       \
                -D CMAKE_BUILD_TYPE=Release                                     \
                -D CMAKE_SYSTEM_NAME=Linux                                      \
                -D CMAKE_SYSTEM_PROCESSOR=${{ matrix.processor }}               \
                -D CMAKE_C_FLAGS=${{ matrix.cflags }}                           \
                -D CMAKE_CXX_FLAGS=${{ matrix.cxxflags }}                       \
                -G Ninja                                                        \
                -S ${{ github.workspace }}
      - name: Build
        run: cmake --build ${{ github.workspace }}/BinaryCache/ds2 --config Releaase

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.processor }}-ds2
          path: |
            ${{ github.workspace }}/BinaryCache/ds2/ds2

  # Cross-compile for Android on a Windows host.
  android-windows-ndk:
    needs: [windows_tools]
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            cc: clang
            cflags: "-ffunction-sections -fdata-sections"
            cxx: clang++
            cxxflags: "-ffunction-sections -fdata-sections"
            os: Android
            extra_flags: -DCMAKE_ANDROID_API=28 -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a

          - arch: armv7
            cc: clang
            cflags: "-ffunction-sections -fdata-sections"
            cxx: clang++
            cxxflags: "-ffunction-sections -fdata-sections"
            os: Android
            extra_flags: -DCMAKE_ANDROID_API=28 -DCMAKE_ANDROID_ARCH_ABI=armeabi-v7a

          - arch: i686
            cc: clang
            cflags: "-ffunction-sections -fdata-sections"
            cxx: clang++
            cxxflags: "-ffunction-sections -fdata-sections"
            os: Android
            extra_flags: -DCMAKE_ANDROID_API=28 -DCMAKE_ANDROID_ARCH_ABI=x86

          - arch: x86_64
            cc: clang
            cflags: "-ffunction-sections -fdata-sections"
            cxx: clang++
            cxxflags: "-ffunction-sections -fdata-sections"
            os: Android
            extra_flags: -DCMAKE_ANDROID_API=28 -DCMAKE_ANDROID_ARCH_ABI=x86_64

    name: ${{ matrix.os }} ${{ matrix.arch }} ds2

    steps:
      - uses: actions/checkout@v4
        with:
          repository: compnerd/ds2
          ref: ${{ needs.context.outputs.ds2_revision }}
          path: ${{ github.workspace }}/SourceCache/ds2
          show-progress: false

      - uses: compnerd/gha-setup-vsdevenv@main
        with:
          host_arch: amd64
          components: 'Microsoft.VisualStudio.Component.VC.Tools.x86.x64;Microsoft.VisualStudio.Component.VC.Tools.ARM64'
          arch: ${{ matrix.arch }}

      - name: Install Flex and Bison Tools
        run: choco install winflexbison3

      - uses: actions/download-artifact@v4
        with:
          name: windows-regsgen2
          path: ${{ github.workspace }}/BinaryCache/RegsGen2

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Configure DS2
        run: |
          $NDKPATH = cygpath -m ${{ steps.setup-ndk.outputs.ndk-path }}
          cmake -B ${{ github.workspace }}/BinaryCache/ds2 `
                -D CMAKE_BUILD_TYPE=Release `
                -D CMAKE_C_COMPILER=${{ matrix.cc }} `
                -D CMAKE_C_FLAGS="${{ matrix.cflags }}" `
                -D CMAKE_CXX_COMPILER=${{ matrix.cxx }} `
                -D CMAKE_CXX_FLAGS="${{ matrix.cxxflags }}" `
                -D CMAKE_MT=mt `
                -D CMAKE_INSTALL_PREFIX=${{ github.workspace }}/BuildRoot/Library/DebugServer2 `
                -D MSVC_C_ARCHITECTURE_ID=${{ matrix.arch }} `
                -D DS2_REGSGEN2=${{ github.workspace }}/BinaryCache/RegsGen2/regsgen2.exe `
                -D CMAKE_SYSTEM_NAME=${{ matrix.os }} `
                -D CMAKE_ANDROID_NDK=$NDKPATH `
                ${{ matrix.extra_flags }} `
                -G Ninja `
                -S ${{ github.workspace }}/SourceCache/ds2

      - name: Build DS2
        run: cmake --build ${{ github.workspace }}/BinaryCache/ds2

      - name: Install DS2
        run: cmake --build ${{ github.workspace }}/BinaryCache/ds2 --target install

      - uses: actions/upload-artifact@v4
        with:
          name: ds2-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ github.workspace }}/BuildRoot/Library/DebugServer2/bin/ds2
